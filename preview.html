<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Programa de Asistencia Financiera — ESEN</title>
<meta name="description" content="Programa de asistencia financiera de la ESEN: becas, créditos educativos y planes de pago." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --navy:#16335A; --navy-deep:#0E2440; --light-blue:#CBDFF0;
    --pale-blue:#EAF1F9; --orange:#E2871F; --ink:#16273D; --cloud:#F4F7FB;
    --maxw:1120px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:"Inter",system-ui,sans-serif;color:var(--ink);background:var(--cloud);line-height:1.6;-webkit-font-smoothing:antialiased}
  h1,h2,h3{font-family:"Archivo",sans-serif;line-height:1.05;letter-spacing:-0.01em}
  a{color:inherit}
  img{display:block;max-width:100%}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 28px}
  .eyebrow{font-family:"Inter";font-weight:600;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase}

  /* Header */
  header.site{position:sticky;top:0;z-index:50;background:rgba(244,247,251,.86);backdrop-filter:blur(8px);border-bottom:1px solid rgba(22,51,90,.1)}
  header.site .wrap{display:flex;align-items:center;justify-content:space-between;height:64px}
  .wordmark{display:flex;align-items:center;gap:10px;font-family:"Archivo";font-weight:900;font-size:1.35rem;letter-spacing:.04em;color:var(--navy);text-decoration:none}
  .wordmark .tree{width:30px;height:30px;border-radius:7px;background:var(--navy);color:#fff;display:grid;place-items:center;font-size:.95rem}
  .btn{display:inline-block;background:var(--orange);color:#fff;text-decoration:none;font-weight:600;font-size:.92rem;padding:10px 20px;border-radius:999px;transition:transform .15s ease, background .15s ease}
  .btn:hover{background:#cf7714;transform:translateY(-1px)}

  /* Hero */
  .hero{display:grid;grid-template-columns:1fr 1.15fr;min-height:560px}
  .hero .panel{background:var(--navy);color:#fff;padding:64px 56px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
  .hero .panel .eyebrow{color:var(--light-blue);margin-bottom:22px}
  .hero .panel p.intro{font-size:1.18rem;line-height:1.7;color:#dbe6f3;max-width:30ch}
  .hero .panel .emph{color:#fff;font-weight:600}
  .hero .panel .rule{width:54px;height:4px;background:var(--orange);margin-top:32px;border-radius:2px}
  .hero .visual{position:relative;background:var(--navy-deep)}
  .hero .visual img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
  .hero .visual .ph{position:absolute;inset:0;background:linear-gradient(150deg,#1b3f6b,#0e2440)}
  .hero .visual .title{position:absolute;left:40px;bottom:48px;right:40px;z-index:2}
  .hero .visual .title .pre{font-family:"Archivo";font-weight:600;font-size:clamp(1.6rem,3vw,2.4rem);color:#cdddf0;display:block}
  .hero .visual .title .big{font-family:"Archivo";font-weight:900;font-size:clamp(2.6rem,5.2vw,4.4rem);color:#fff;display:block;text-shadow:0 2px 30px rgba(0,0,0,.4)}
  .hero .visual::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(8,20,38,.72),rgba(8,20,38,0) 55%);z-index:1}

  /* Section scaffold */
  section{padding:84px 0}
  .sec-head{display:flex;align-items:baseline;gap:18px;margin-bottom:44px}
  .sec-head h2{font-size:clamp(1.7rem,3.4vw,2.5rem);font-weight:800;color:var(--navy);max-width:18ch}
  .sec-head .idx{font-family:"Archivo";font-weight:700;color:var(--orange);font-size:1rem;letter-spacing:.15em;padding-top:.4rem}

  .arrow{color:var(--orange);font-weight:700;margin-right:.5em}

  /* Pago */
  .opts{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-bottom:48px}
  .opt{background:#fff;border:1px solid rgba(22,51,90,.12);border-radius:16px;padding:26px}
  .opt h3{font-size:1.12rem;font-weight:700;color:var(--navy);margin-bottom:8px}
  .opt p{font-size:.96rem;color:#42546b}
  .bancos-h{font-family:"Archivo";font-weight:700;color:var(--navy);font-size:1.15rem;margin:8px 0 20px}
  .banks{display:grid;grid-template-columns:1fr 1fr;gap:22px}
  .bank{border:1px solid rgba(22,51,90,.14);border-radius:18px;padding:30px;background:var(--pale-blue)}
  .bank h3{font-size:1.3rem;font-weight:800;color:var(--navy);margin-bottom:18px}
  .bank ul{list-style:none}
  .bank li{display:flex;gap:.5em;font-size:.95rem;color:#33465c;padding:7px 0;border-top:1px solid rgba(22,51,90,.09)}
  .bank li:first-child{border-top:0}
  .notas{margin-top:32px;display:grid;gap:14px}
  .nota{font-size:.88rem;color:#5a6b80;border-left:3px solid var(--light-blue);padding-left:16px;max-width:75ch}

  /* Becas */
  .becas{background:var(--light-blue)}
  .becas .sec-head h2{color:var(--navy)}
  .beca-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
  .beca{background:#fff;border-radius:18px;padding:30px;border-top:5px solid var(--orange)}
  .beca h3{font-size:1.08rem;font-weight:700;color:var(--navy);margin-bottom:12px;line-height:1.25}
  .beca p{font-size:.92rem;color:#48596e}

  /* Planes */
  .planes{background:var(--navy);color:#fff}
  .planes .inner{display:grid;grid-template-columns:.8fr 1.2fr;gap:40px;align-items:center}
  .planes h2{color:#fff;font-size:clamp(1.7rem,3.4vw,2.5rem);font-weight:800}
  .planes p{font-size:1.08rem;color:#d7e3f1;line-height:1.75}
  .planes .rule{width:54px;height:4px;background:var(--orange);border-radius:2px;margin-top:18px}

  /* Costos */
  .costos{background:var(--navy-deep);color:#fff}
  .costos .sec-head h2{color:#fff}
  .cost-list{display:grid;gap:2px;max-width:760px}
  .cost-row{display:flex;align-items:baseline;justify-content:space-between;gap:18px;padding:16px 4px;border-bottom:1px solid rgba(255,255,255,.12)}
  .cost-row .monto{font-family:"Archivo";font-weight:800;font-size:1.35rem;color:var(--orange);white-space:nowrap}
  .cost-row .concepto{color:#cdd9e8;font-size:1rem;text-align:right}
  .cost-note{margin-top:18px;font-size:.85rem;color:#9fb2cb}

  /* Generalidades */
  .gen-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px 40px}
  .gen{display:flex;gap:14px;padding:18px 0;border-bottom:1px solid rgba(22,51,90,.1)}
  .gen .n{font-family:"Archivo";font-weight:800;color:var(--orange);font-size:1.1rem;min-width:1.5em}
  .gen p{font-size:1rem;color:#33465c}

  /* Footer / Contacto */
  footer{background:var(--navy);color:#fff;padding:72px 0 40px}
  footer h2{color:#fff;font-size:1.9rem;font-weight:800;margin-bottom:32px}
  .foot-grid{display:grid;grid-template-columns:1.1fr 1fr;gap:48px}
  .contact-item{margin-bottom:18px}
  .contact-item .lbl{display:block;color:var(--light-blue);font-weight:600;font-size:.95rem;margin-bottom:2px}
  .contact-item a{color:#dbe6f3;text-decoration:none;font-size:1rem}
  .contact-item a:hover{color:#fff;text-decoration:underline}
  .phones{color:#dbe6f3;font-size:1rem;margin-top:10px}
  .foot-meta a{color:#dbe6f3;text-decoration:none}
  .foot-meta .site{font-weight:600;color:#fff;display:inline-block;margin-bottom:14px}
  .foot-meta address{font-style:normal;color:#b9c7da;font-size:.95rem;line-height:1.7;max-width:42ch}
  .social{display:flex;gap:12px;margin-top:26px;flex-wrap:wrap}
  .social a{font-size:.82rem;color:#cdddf0;border:1px solid rgba(255,255,255,.25);padding:6px 13px;border-radius:999px;text-decoration:none;transition:background .15s}
  .social a:hover{background:rgba(255,255,255,.12)}
  .foot-bottom{margin-top:48px;padding-top:22px;border-top:1px solid rgba(255,255,255,.14);font-size:.82rem;color:#9fb2cb;display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}

  @media (max-width:880px){
    .hero{grid-template-columns:1fr}
    .hero .visual{min-height:380px}
    .opts,.beca-grid{grid-template-columns:1fr}
    .banks,.planes .inner,.gen-grid,.foot-grid{grid-template-columns:1fr}
    .hero .panel{padding:48px 28px}
    section{padding:60px 0}
  }
  @media (prefers-reduced-motion:no-preference){
    .reveal{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease}
    .reveal.in{opacity:1;transform:none}
  }
</style>
</head>
<body>

<script>
const esc = s => String(s ?? "").replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

async function loadContent(){
  if (window.__CONTENT__) return window.__CONTENT__;
  const res = await fetch("./content.json", {cache:"no-store"});
  if(!res.ok) throw new Error("No se pudo cargar content.json");
  return res.json();
}

function applyBrand(b){
  if(!b) return;
  const map = {navy:"--navy",navyDeep:"--navy-deep",lightBlue:"--light-blue",paleBlue:"--pale-blue",orange:"--orange",ink:"--ink",cloud:"--cloud"};
  for(const k in map){ if(b[k]) document.documentElement.style.setProperty(map[k], b[k]); }
}

function render(c){
  document.title = c.meta?.title || document.title;
  document.documentElement.lang = c.meta?.lang || "es";
  applyBrand(c.brand);

  const h = c.header||{}, hero=c.hero||{}, pago=c.pago||{}, becas=c.becas||{},
        planes=c.planes||{}, costos=c.costos||{}, gen=c.generalidades||{}, ct=c.contacto||{};

  const opt = o => `<div class="opt"><h3>${esc(o.titulo)}</h3><p>${esc(o.detalle)}</p></div>`;
  const bank = b => `<div class="bank"><h3>${esc(b.nombre)}</h3><ul>${(b.puntos||[]).map(p=>`<li><span class="arrow">→</span><span>${esc(p)}</span></li>`).join("")}</ul></div>`;
  const beca = x => `<div class="beca"><h3>${esc(x.titulo)}</h3><p>${esc(x.detalle)}</p></div>`;
  const cost = x => `<div class="cost-row"><span class="monto">${esc(x.monto)}</span><span class="concepto">${esc(x.concepto)}</span></div>`;
  const genItem = (t,i) => `<div class="gen"><span class="n">0${i+1}</span><p>${esc(t)}</p></div>`;
  const contact = x => `<div class="contact-item"><span class="lbl">${esc(x.etiqueta)}</span><a href="mailto:${esc(x.email)}">${esc(x.email)}</a></div>`;
  const social = s => `<a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.red)}</a>`;

  document.getElementById("app").innerHTML = `
  <header class="site"><div class="wrap">
    <a class="wordmark" href="#top"><span class="tree">🌳</span>${esc(h.wordmark||"ESEN")}</a>
    <a class="btn" href="${esc(h.ctaHref||"#contacto")}">${esc(h.ctaLabel||"Contáctanos")}</a>
  </div></header>

  <main id="top">
    <section class="hero" style="padding:0">
      <div class="panel">
        <span class="eyebrow">${esc(hero.eyebrow)}</span>
        <p class="intro">${esc(hero.intro)}</p>
        <span class="rule"></span>
      </div>
      <div class="visual">
        <img src="${esc(hero.image)}" alt="${esc(hero.imageAlt)}" onerror="this.remove()" />
        <div class="ph"></div>
        <div class="title">
          <span class="pre">${esc(hero.titlePrefix)}</span>
          <span class="big">${esc(hero.titleEmphasis)}</span>
        </div>
      </div>
    </section>

    <section class="pago"><div class="wrap">
      <div class="sec-head"><span class="idx">01</span><h2>${esc(pago.heading)}</h2></div>
      <div class="opts reveal">${(pago.opciones||[]).map(opt).join("")}</div>
      <p class="bancos-h">${esc(pago.bancosHeading||"Créditos educativos")}</p>
      <div class="banks reveal">${(pago.bancos||[]).map(bank).join("")}</div>
      <div class="notas">${(pago.notas||[]).map(n=>`<p class="nota">${esc(n)}</p>`).join("")}</div>
    </div></section>

    <section class="becas"><div class="wrap">
      <div class="sec-head"><span class="idx">02</span><h2>${esc(becas.heading)}</h2></div>
      <div class="beca-grid reveal">${(becas.items||[]).map(beca).join("")}</div>
    </div></section>

    <section class="planes"><div class="wrap">
      <div class="inner">
        <div><h2>${esc(planes.heading)}</h2><span class="rule"></span></div>
        <p>${esc(planes.texto)}</p>
      </div>
    </div></section>

    <section class="costos"><div class="wrap">
      <div class="sec-head"><span class="idx">03</span><h2>${esc(costos.heading)}</h2></div>
      <div class="cost-list reveal">${(costos.items||[]).map(cost).join("")}</div>
      <p class="cost-note">${esc(costos.nota)}</p>
    </div></section>

    <section class="gen"><div class="wrap">
      <div class="sec-head"><span class="idx">04</span><h2>${esc(gen.heading)}</h2></div>
      <div class="gen-grid reveal">${(gen.items||[]).map(genItem).join("")}</div>
    </div></section>
  </main>

  <footer id="contacto"><div class="wrap">
    <h2>${esc(ct.heading||"Contactos")}</h2>
    <div class="foot-grid">
      <div>
        ${(ct.items||[]).map(contact).join("")}
        <p class="phones">${(ct.telefonos||[]).map(esc).join(" · ")}</p>
        <div class="social">${(ct.redes||[]).map(social).join("")}</div>
      </div>
      <div class="foot-meta">
        <a class="site" href="${esc(ct.sitioHref||"#")}" target="_blank" rel="noopener">${esc(ct.sitio||"")}</a>
        <address>${esc(ct.direccion||"")}</address>
      </div>
    </div>
    <div class="foot-bottom">
      <span>© ${new Date().getFullYear()} ${esc(h.wordmark||"ESEN")}. Todos los derechos reservados.</span>
      <span>Programa de Asistencia Financiera</span>
    </div>
  </div></footer>`;

  document.getElementById("app").setAttribute("aria-busy","false");

  if (window.matchMedia("(prefers-reduced-motion: no-preference)").matches){
    const io = new IntersectionObserver(es=>es.forEach(e=>{if(e.isIntersecting){e.target.classList.add("in");io.unobserve(e.target);}}),{threshold:.12});
    document.querySelectorAll(".reveal").forEach(el=>io.observe(el));
  }
}

loadContent().then(render).catch(err=>{
  document.getElementById("app").innerHTML =
    `<div style="padding:60px 28px;font-family:Inter,sans-serif;color:#16273D">
       <h2 style="font-family:Archivo">No se pudo cargar el contenido</h2>
       <p>${esc(err.message)}. Verifica que <code>content.json</code> esté junto a <code>index.html</code>.</p>
     </div>`;
});
</script>
</body>
</html>
